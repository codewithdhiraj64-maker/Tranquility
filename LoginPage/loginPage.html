<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tranquility - Ambient Canvas</title>
    
    <!-- Google Fonts: Lora (Serif) & Inter (Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/loginStyle.css">
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-content">
            <h1 class="welcome-title">Tranquility</h1>
            <p class="welcome-subtitle">Take a deep breath. Find your calm.</p>
        </div>
    </div>

    <!-- Ambient Canvas Background: Fluid drifting and warping blobs -->
    <div class="ambient-canvas">
        <div class="ambient-blob blob-lavender"></div>
        <div class="ambient-blob blob-sage"></div>
        <div class="ambient-blob blob-peach"></div>
    </div>

    <div class="toggle-positioner">
        <label id="theme-toggle-button">
            <input type="checkbox" id="toggle">
            <svg viewBox="0 0 69.667 44" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg">
                <g transform="translate(3.5 3.5)" data-name="Component 15 – 1" id="Component_15_1">
                    <g filter="url(#container)" transform="matrix(1, 0, 0, 1, -3.5, -3.5)">
                        <rect fill="#2b4360" transform="translate(3.5 3.5)" rx="17.5" height="35" width="60.667" data-name="container" id="container"></rect>
                    </g>
                    
                    <g transform="translate(2.333 2.333)" id="button">
                        <g data-name="sun" id="sun">
                            <g filter="url(#sun-outer)" transform="matrix(1, 0, 0, 1, -5.83, -5.83)">
                                <circle fill="#f8e664" transform="translate(5.83 5.83)" r="15.167" cy="15.167" cx="15.167" data-name="sun-outer" id="sun-outer-2"></circle>
                            </g>
                            <g filter="url(#sun)" transform="matrix(1, 0, 0, 1, -5.83, -5.83)">
                                <path fill="rgba(246,254,247,0.29)" transform="translate(9.33 9.33)" d="M11.667,0A11.667,11.667,0,1,1,0,11.667,11.667,11.667,0,0,1,11.667,0Z" data-name="sun" id="sun-3"></path>
                            </g>
                            <circle fill="#fcf4b9" transform="translate(8.167 8.167)" r="7" cy="7" cx="7" id="sun-inner"></circle>
                        </g>
                        
                        <g data-name="moon" id="moon">
                            <g filter="url(#moon)" transform="matrix(1, 0, 0, 1, -31.5, -5.83)">
                                <circle fill="#cce6ee" transform="translate(31.5 5.83)" r="15.167" cy="15.167" cx="15.167" data-name="moon" id="moon-3"></circle>
                            </g>
                            <g fill="#a6cad0" transform="translate(-24.415 -1.009)" id="patches">
                                <circle transform="translate(43.009 4.496)" r="2" cy="2" cx="2"></circle>
                                <circle transform="translate(39.366 17.952)" r="2" cy="2" cx="2" data-name="patch"></circle>
                                <circle transform="translate(33.016 8.044)" r="1" cy="1" cx="1" data-name="patch"></circle>
                                <circle transform="translate(51.081 18.888)" r="1" cy="1" cx="1" data-name="patch"></circle>
                                <circle transform="translate(33.016 22.503)" r="1" cy="1" cx="1" data-name="patch"></circle>
                                <circle transform="translate(50.081 10.53)" r="1.5" cy="1.5" cx="1.5" data-name="patch"></circle>
                            </g>
                        </g>
                    </g>
                    
                    <g filter="url(#cloud)" transform="matrix(1, 0, 0, 1, -3.5, -3.5)">
                        <path fill="#fff" transform="translate(-3466.47 -160.94)" d="M3512.81,173.815a4.463,4.463,0,0,1,2.243.62.95.95,0,0,1,.72-1.281,4.852,4.852,0,0,1,2.623.519c.034.02-.5-1.968.281-2.716a2.117,2.117,0,0,1,2.829-.274,1.821,1.821,0,0,1,.854,1.858c.063.037,2.594-.049,3.285,1.273s-.865,2.544-.807,2.626a12.192,12.192,0,0,1,2.278.892c.553.448,1.106,1.992-1.62,2.927a7.742,7.742,0,0,1-3.762-.3c-1.28-.49-1.181-2.65-1.137-2.624s-1.417,2.2-2.623,2.2a4.172,4.172,0,0,1-2.394-1.206,3.825,3.825,0,0,1-2.771.774c-3.429-.46-2.333-3.267-2.2-3.55A3.721,3.721,0,0,1,3512.81,173.815Z" data-name="cloud" id="cloud"></path>
                    </g>

                    <g fill="#def8ff" transform="translate(3.585 1.325)" id="stars">
                        <path transform="matrix(-1, 0.017, -0.017, -1, 24.231, 3.055)" d="M.774,0,.566.559,0,.539.458.933.25,1.492l.485-.361.458.394L1.024.953,1.509.592.943.572Z"></path>
                        <path transform="matrix(-0.777, 0.629, -0.629, -0.777, 23.185, 12.358)" d="M1.341.529.836.472.736,0,.505.46,0,.4.4.729l-.231.46L.605.932l.4.326L.9.786Z" data-name="star"></path>
                        <path transform="matrix(0.438, 0.899, -0.899, 0.438, 23.177, 29.735)" d="M.015,1.065.475.9l.285.365L.766.772l.46-.164L.745.494.751,0,.481.407,0,.293.285.658Z" data-name="star"></path>
                        <path transform="translate(12.677 0.388) rotate(104)" d="M1.161,1.6,1.059,1,1.574.722.962.607.86,0,.613.572,0,.457.446.881.2,1.454l.516-.274Z" data-name="star"></path>
                        <path transform="matrix(-0.07, 0.998, -0.998, -0.07, 11.066, 15.457)" d="M.873,1.648l.114-.62L1.579.945,1.03.62,1.144,0,.706.464.157.139.438.7,0,1.167l.592-.083Z" data-name="star"></path>
                        <path transform="translate(8.326 28.061) rotate(11)" d="M.593,0,.638.724,0,.982l.7.211.045.724.36-.64.7.211L1.342.935,1.7.294,1.063.552Z" data-name="star"></path>
                        <path transform="translate(5.012 5.962) rotate(172)" d="M.816,0,.5.455,0,.311.323.767l-.312.455.516-.215.323.456L.827.911,1.343.7.839.552Z" data-name="star"></path>
                        <path transform="translate(2.218 14.616) rotate(169)" d="M1.261,0,.774.571.114.3.487.967,0,1.538.728,1.32l.372.662.047-.749.728-.218L1.215.749Z" data-name="star"></path>
                    </g>
                </g>
            </svg>
        </label>
    </div>
    <div class="widget-screen-container">
    
    <div class="liquid-glass-card" id="loginCard">
        <center><h2 class="card-title">WELCOME</h2>
        <p class="card-subtitle">Begin your journey into stillness</p></center>
        
        <form id="onboardingForm">
            <div class="field-wrapper">
                <label for="alias-input" class="visually-hidden">Preferred Handle / Alias</label>
                <div class="input-container glass-input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <input type="text" id="alias-input" autocomplete="off" name="alias" class="input alias-input" placeholder="What should we call you?" required>
                </div>
                <p class="privacy-note privacy-transition">Your privacy matters. Aliases keep your space completely yours.</p>
            </div>

            <div class="field-wrapper">
                <div class="input-container">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" autocomplete="off" name="email" class="input" placeholder="Email Address" required>
                </div>
            </div>

            <div class="input-row">
                <div class="field-wrapper">
                    <div class="input-container">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg>
                        <input type="number" autocomplete="off" name="age" class="input" placeholder="Age" required>
                    </div>
                </div>
                <div class="field-wrapper" style="height: 100%;">
                    <div class="radio-group-glass">
                        <label class="radio-glass-label">
                            <input type="radio" name="gender" value="male" class="visually-hidden radio-glass-input" required>
                            <span class="radio-glass-btn">He</span>
                        </label>
                        <label class="radio-glass-label">
                            <input type="radio" name="gender" value="female" class="visually-hidden radio-glass-input">
                            <span class="radio-glass-btn">She</span>
                        </label>
                        <label class="radio-glass-label">
                            <input type="radio" name="gender" value="they" class="visually-hidden radio-glass-input">
                            <span class="radio-glass-btn">They</span>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="glass-button" id="submitBtn">
                <span>Sign Up</span>
            </button>
            
            <div style="text-align:center; margin-top: 20px;">
                <a href="#" id="showLoginBtn" style="color: rgba(255,255,255,0.7); font-size: 0.9em; text-decoration: none; transition: color 0.3s;">Already have an account? Log in</a>
            </div>
        </form>

        <!-- New Log In Form -->
        <form id="loginForm" style="display: none;">
            <div class="field-wrapper">
                <div class="input-container">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" autocomplete="off" name="loginEmail" id="loginEmailInput" class="input" placeholder="Email Address" required>
                </div>
                <p id="loginError" style="color: #ff6b6b; font-size: 0.85em; margin-top: 10px; display: none; text-align: center;">User not found. Please sign up.</p>
            </div>
            
            <button type="submit" class="glass-button" id="loginSubmitBtn">
                <span>Log In</span>
            </button>
            
            <div style="text-align:center; margin-top: 20px;">
                <a href="#" id="showSignupBtn" style="color: rgba(255,255,255,0.7); font-size: 0.9em; text-decoration: none; transition: color 0.3s;">New here? Sign up</a>
            </div>
        </form>
    </div>

    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <filter
            id="glass"
            x="-50%"
            y="-50%"
            width="200%"
            height="200%"
            primitiveUnits="objectBoundingBox"
        >
            <feImage
                x="-50%"
                y="-50%"
                width="200%"
                height="200%"
                result="map"
            />
            <feGaussianBlur in="SourceGraphic" stdDeviation="0.02" result="blur" />
            <feDisplacementMap
                id="disp"
                in="blur"
                in2="map"
                scale="0.8"
                xChannelSelector="R"
                yChannelSelector="G"
            ></feDisplacementMap>
        </filter>
    </svg>

</div>

    <script src="loginScript.js"></script>
</body>
</html>
